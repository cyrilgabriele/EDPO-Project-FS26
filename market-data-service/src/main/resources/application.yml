server:
  port: 8081

spring:
  application:
    name: market-data-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Binance WebSocket stream configuration
binance:
  stream-url: ${BINANCE_STREAM_URL:wss://stream.binance.com:9443/ws}
  # Comma-separated list of trading pairs to subscribe to
  symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,LTCUSDT

# Kafka topic names
crypto:
  kafka:
    topic:
      price-raw: crypto.price.raw
      price-raw-dlt: crypto.price.raw.DLT
      price-raw-partitions: 3

management:
  endpoints:
    web:
      exposure:
        include: health
